<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BetLedger" />
  <title>BetLedger</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root{
      --bg:#f4f6fb;--card:#ffffff;--text:#111827;--muted:#717789;--line:#e7eaf1;
      --green:#21c56b;--red:#ff4567;--blue:#0a74ff;--chip:#eef1f7;--shadow:0 18px 50px rgba(16,24,40,.10);
      --input:#ffffff;--inputLine:#d8dde8;--overlay:rgba(15,23,42,.42)
    }
    [data-theme="dark"]{
      --bg:#0d111a;--card:#121823;--text:#f7f8fb;--muted:#9aa3b7;--line:#263145;
      --green:#63e88d;--red:#ff4f6f;--blue:#85b8ff;--chip:#1b2433;--shadow:0 18px 50px rgba(0,0,0,.35);
      --input:#101723;--inputLine:#2a364b;--overlay:rgba(0,0,0,.55)
    }
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font:inherit} button{cursor:pointer;border:0} .app{max-width:430px;min-height:100vh;margin:0 auto;padding:18px 16px 92px;background:var(--bg)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 20px}.brand h1{margin:0;font-size:34px;letter-spacing:-.04em}.brand p{margin:3px 0 0;color:var(--muted);font-weight:600}
    .iconbtn{width:42px;height:42px;border-radius:14px;background:var(--chip);color:var(--text);display:grid;place-items:center;font-weight:800}.tabs{display:flex;background:var(--chip);padding:4px;border-radius:12px;margin-bottom:16px}.tabs button{flex:1;padding:10px;border-radius:9px;background:transparent;color:var(--muted);font-weight:750}.tabs button.active{background:var(--card);color:var(--text);box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow)}.stat small{color:var(--muted);font-weight:750}.stat strong{display:block;margin-top:6px;font-size:26px;letter-spacing:-.03em}.pos{color:var(--green)}.neg{color:var(--red)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:var(--shadow);margin:12px 0}.section-title{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px}.section-title h2{font-size:22px;margin:0;letter-spacing:-.03em}.section-title button{background:transparent;color:var(--blue);font-weight:750}
    .row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.avatar{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#0a74ff,#21c56b);color:#fff;font-weight:900}.row-main{flex:1;min-width:0}.row-title{font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-sub{color:var(--muted);font-size:13px;margin-top:3px}.amount{font-weight:900}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:var(--chip);color:var(--muted);font-weight:800;font-size:12px}.open{color:var(--blue)}.settled{color:var(--green)}.cancelled{color:var(--muted)}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.dow{text-align:center;color:var(--muted);font-weight:800}.day{aspect-ratio:1;border-radius:14px;background:var(--chip);padding:7px 4px;text-align:center;font-weight:800;font-size:12px;color:var(--muted)}.day .val{display:block;margin-top:4px;font-size:13px}.day.posday{background:rgba(33,197,107,.16)}.day.negday{background:rgba(255,69,103,.15)}
    .bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;max-width:430px;width:100%;background:color-mix(in srgb,var(--card) 88%,transparent);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:10px 16px 22px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}.nav{background:transparent;color:var(--muted);font-size:11px;font-weight:800;padding:6px;border-radius:12px}.nav span{display:block;font-size:21px;margin-bottom:2px}.nav.active{color:var(--blue);background:var(--chip)}
    .fab{position:fixed;left:50%;bottom:82px;transform:translateX(139px);width:58px;height:58px;border-radius:50%;background:var(--blue);color:white;font-size:32px;box-shadow:0 15px 35px rgba(10,116,255,.35)}
    .modal{position:fixed;inset:0;background:var(--overlay);display:none;align-items:flex-end;justify-content:center;z-index:20}.modal.show{display:flex}.sheet{width:100%;max-width:430px;max-height:90vh;overflow:auto;background:var(--card);border-radius:26px 26px 0 0;padding:18px 16px 28px;border:1px solid var(--line)}.sheet h3{font-size:24px;margin:4px 0 14px}.field{margin:11px 0}.field label{display:block;color:var(--muted);font-size:13px;font-weight:850;margin:0 0 6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--inputLine);background:var(--input);color:var(--text);border-radius:14px;padding:12px 13px;outline:none}.field textarea{min-height:82px;resize:vertical}.actions{display:flex;gap:10px;margin-top:14px}.primary,.secondary,.danger{flex:1;border-radius:15px;padding:13px;font-weight:900}.primary{background:var(--blue);color:#fff}.secondary{background:var(--chip);color:var(--text)}.danger{background:rgba(255,69,103,.13);color:var(--red)}.hide{display:none!important}.empty{color:var(--muted);text-align:center;padding:20px 10px}.mini{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="top"><div class="brand"><h1>BetLedger</h1><p id="subtitle">Local bet ledger</p></div><button class="iconbtn" id="themeBtn">◐</button></header>
  <div class="tabs"><button data-view="dashboard" class="active">Ledger</button><button data-view="calendar">Calendar</button><button data-view="history">History</button></div>
  <main id="view"></main>
</div>
<button class="fab" id="quickAdd">+</button>
<nav class="bottom">
  <button class="nav active" data-view="dashboard"><span>◷</span>Home</button><button class="nav" data-view="bets"><span>◱</span>Bets</button><button class="nav" data-view="players"><span>☷</span>People</button><button class="nav" data-view="prizes"><span>◇</span>Prizes</button><button class="nav" data-view="settings"><span>⚙</span>More</button>
</nav>
<div class="modal" id="modal"><div class="sheet"><div id="modalBody"></div></div></div>
<script>
const KEY='betledger.v1';
const seed={theme:'dark',currency:'Q',unitLabel:'u',players:[{id:id(),name:'Andre',credits:100},{id:id(),name:'Friend',credits:100}],bets:[],transactions:[]};
let state=load(); let current='dashboard';
function id(){return Math.random().toString(36).slice(2,10)}
function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed}catch{return seed}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render()}
function money(n){const v=Number(n||0);return `${state.currency}${Math.abs(v).toFixed(v%1?2:0)}`}
function unit(n){const v=Number(n||0);return `${Math.abs(v).toFixed(v%1?2:0)}${state.unitLabel}`}
function signed(n,type='money'){return `${n>=0?'+':'-'}${type==='money'?money(n):unit(n)}`}
function byId(id){return state.players.find(p=>p.id===id)}
function net(p){let n=Number(p.credits||0); state.bets.filter(b=>b.status==='settled'&&b.stakeType==='money').forEach(b=>{(b.settlements||[]).forEach(s=>{if(s.from===p.id)n-=Number(s.amount||0); if(s.to===p.id)n+=Number(s.amount||0)})}); return n}
function openModal(html){modalBody.innerHTML=html; modal.classList.add('show')}
function closeModal(){modal.classList.remove('show')}
modal.addEventListener('click',e=>{if(e.target.id==='modal')closeModal()})
function setView(v){current=v; document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===v)); render()}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));
themeBtn.onclick=()=>{state.theme=state.theme==='dark'?'light':'dark'; save()}; quickAdd.onclick=()=>showBetForm();
function render(){document.documentElement.dataset.theme=state.theme||'dark'; const view=document.getElementById('view'); const total=state.players.reduce((a,p)=>a+net(p),0); subtitle.textContent=`${state.players.length} players · ${state.bets.filter(b=>b.status==='open').length} open bets`; if(current==='dashboard')view.innerHTML=dashboard(); if(current==='calendar')view.innerHTML=calendarView(); if(current==='history')view.innerHTML=historyView(); if(current==='bets')view.innerHTML=betsView(); if(current==='players')view.innerHTML=playersView(); if(current==='prizes')view.innerHTML=prizesView(); if(current==='settings')view.innerHTML=settingsView(); bind();}
function dashboard(){const open=state.bets.filter(b=>b.status==='open').length;const settled=state.bets.filter(b=>b.status==='settled').length;return `<div class="grid"><div class="stat"><small>Open Bets</small><strong>${open}</strong></div><div class="stat"><small>Settled</small><strong>${settled}</strong></div></div><div class="section-title"><h2>Running Count</h2><button onclick="showTopup()">Top up</button></div><div class="card">${state.players.map(p=>playerRow(p)).join('')||empty('Add players to start')}</div><div class="section-title"><h2>Open Bets</h2><button onclick="showBetForm()">New bet</button></div><div class="card">${state.bets.filter(b=>b.status==='open').map(b=>betRow(b)).join('')||empty('No open bets')}</div>`}
function playerRow(p){const n=net(p);return `<div class="row"><div class="avatar">${p.name[0]?.toUpperCase()||'?'}</div><div class="row-main"><div class="row-title">${p.name}</div><div class="row-sub">Credits ${money(p.credits||0)}</div></div><div class="amount ${n>=0?'pos':'neg'}">${signed(n)}</div></div>`}
function betRow(b){return `<div class="row" onclick="showBet('${b.id}')"><div class="avatar">${b.stakeType==='money'?'$':'◇'}</div><div class="row-main"><div class="row-title">${b.title}</div><div class="row-sub">${b.status} · ${stakeText(b)} · ${peopleText(b.participants)}</div></div><div class="pill ${b.status}">${b.status}</div></div>`}
function stakeText(b){return b.stakeType==='money'?money(b.amount):b.prizeDescription||'Prize'} function peopleText(ids){return ids.map(x=>byId(x)?.name).filter(Boolean).join(', ')} function empty(t){return `<div class="empty">${t}</div>`}
function betsView(){return `<div class="section-title"><h2>All Bets</h2><button onclick="showBetForm()">New</button></div><div class="card">${state.bets.map(b=>betRow(b)).join('')||empty('No bets yet')}</div>`}
function historyView(){return `<div class="section-title"><h2>History</h2><button onclick="exportData()">Export</button></div><div class="card">${state.bets.filter(b=>b.status!=='open').map(b=>betRow(b)).join('')||empty('No settled or cancelled bets')}</div>`}
function playersView(){return `<div class="section-title"><h2>Players</h2><button onclick="showPlayerForm()">Add</button></div><div class="card">${state.players.map(p=>`<div class="row"><div class="avatar">${p.name[0]?.toUpperCase()}</div><div class="row-main"><div class="row-title">${p.name}</div><div class="row-sub">Starting credits ${money(p.credits||0)}</div></div><button class="secondary" onclick="showTopup('${p.id}')">Top up</button></div>`).join('')||empty('No players')}</div>`}
function prizesView(){let items=[]; state.bets.filter(b=>b.status==='settled'&&b.stakeType!=='money').forEach(b=>(b.settlements||[]).forEach(s=>items.push(`<div class="row"><div class="avatar">◇</div><div class="row-main"><div class="row-title">${b.prizeDescription}</div><div class="row-sub">${byId(s.from)?.name} owes ${byId(s.to)?.name} · ${b.title}</div></div></div>`))); return `<div class="section-title"><h2>Prizes Owed</h2></div><div class="card">${items.join('')||empty('No prize settlements')}</div>`}
function settingsView(){return `<div class="section-title"><h2>Settings</h2></div><div class="card"><div class="row"><div class="row-main"><div class="row-title">Currency</div><div class="row-sub">Current: ${state.currency}</div></div><button class="secondary" onclick="showSettings()">Edit</button></div><div class="row"><div class="row-main"><div class="row-title">Backup</div><div class="row-sub">Export/import local data</div></div><button class="secondary" onclick="exportData()">Export</button></div><div class="row"><div class="row-main"><div class="row-title">Reset</div><div class="row-sub">Deletes local browser data</div></div><button class="danger" onclick="resetData()">Reset</button></div></div>`}
function calendarView(){let d=new Date(), y=d.getFullYear(),m=d.getMonth(); let first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate(); let daily={};state.bets.filter(b=>b.status==='settled').forEach(b=>{let dt=new Date(b.settledAt||b.createdAt); if(dt.getMonth()===m&&dt.getFullYear()===y){let k=dt.getDate(); daily[k]=(daily[k]||0)+(b.stakeType==='money'?Number(b.amount||0):1)}}); let cells='SMTWTFS'.split('').map(x=>`<div class="dow">${x}</div>`).join('')+Array(first).fill('<div></div>').join(''); for(let i=1;i<=days;i++){let v=daily[i]||0; cells+=`<div class="day ${v?'posday':''}">${i}${v?`<span class="val pos">${state.currency}${v}</span>`:''}</div>`}return `<div class="section-title"><h2>${d.toLocaleString('en',{month:'long'})} ${y}</h2><span class="pill">Settled</span></div><div class="calendar">${cells}</div><div class="section-title"><h2>Recent Bets</h2></div><div class="card">${state.bets.slice(-5).reverse().map(betRow).join('')||empty('No bets yet')}</div>`}
function bind(){}
function showPlayerForm(){openModal(`<h3>Add Player</h3><div class="field"><label>Name</label><input id="pname" placeholder="Name"></div><div class="field"><label>Starting credits</label><input id="pcredits" type="number" value="0"></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancel</button><button class="primary" onclick="addPlayer()">Save</button></div>`)}
function addPlayer(){state.players.push({id:id(),name:pname.value.trim()||'Player',credits:Number(pcredits.value||0)});closeModal();save()}
function showTopup(pid=''){openModal(`<h3>Top up credits</h3><div class="field"><label>Player</label><select id="tuPlayer">${state.players.map(p=>`<option value="${p.id}" ${p.id===pid?'selected':''}>${p.name}</option>`).join('')}</select></div><div class="field"><label>Amount</label><input id="tuAmount" type="number" value="100"></div><div class="field"><label>Note</label><input id="tuNote" placeholder="Optional"></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancel</button><button class="primary" onclick="topup()">Top up</button></div>`)}
function topup(){let p=byId(tuPlayer.value);p.credits=Number(p.credits||0)+Number(tuAmount.value||0);state.transactions.push({id:id(),type:'topup',playerId:p.id,amount:Number(tuAmount.value||0),note:tuNote.value,createdAt:new Date().toISOString()});closeModal();save()}
function showBetForm(){openModal(`<h3>New Bet</h3><div class="field"><label>Title</label><input id="btitle" placeholder="Example: loser buys dinner"></div><div class="field"><label>Description / terms</label><textarea id="bdesc"></textarea></div><div class="field"><label>Stake type</label><select id="bstake" onchange="stakeFields()"><option value="money">Money</option><option value="prize">Prize / favor / item</option></select></div><div id="stakeBox"><div class="field"><label>Amount</label><input id="bamount" type="number" value="10"></div></div><div class="field"><label>Participants</label><select id="bparts" multiple size="${Math.min(5,Math.max(2,state.players.length))}">${state.players.map(p=>`<option value="${p.id}" selected>${p.name}</option>`).join('')}</select><div class="mini">Hold Cmd/Ctrl to change selection.</div></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancel</button><button class="primary" onclick="addBet()">Create</button></div>`)}
function stakeFields(){stakeBox.innerHTML=bstake.value==='money'?`<div class="field"><label>Amount</label><input id="bamount" type="number" value="10"></div>`:`<div class="field"><label>Prize description</label><input id="bprize" placeholder="Dinner, coffee, favor, item..."></div>`}
function addBet(){let participants=[...bparts.selectedOptions].map(o=>o.value);state.bets.push({id:id(),title:btitle.value.trim()||'Untitled bet',description:bdesc.value,stakeType:bstake.value,amount:bstake.value==='money'?Number(bamount.value||0):0,prizeDescription:bstake.value==='prize'?bprize.value:'',participants,winnerId:null,loserIds:[],settlements:[],status:'open',createdAt:new Date().toISOString(),settledAt:null});closeModal();save()}
function showBet(bid){let b=state.bets.find(x=>x.id===bid);let html=`<h3>${b.title}</h3><p class="row-sub">${b.description||'No description'}</p><div class="card"><div class="row"><div class="row-main"><div class="row-title">Stake</div><div class="row-sub">${stakeText(b)}</div></div><span class="pill ${b.status}">${b.status}</span></div><div class="row"><div class="row-main"><div class="row-title">Participants</div><div class="row-sub">${peopleText(b.participants)}</div></div></div></div>`; if(b.status==='open')html+=`<div class="actions"><button class="danger" onclick="cancelBet('${b.id}')">Cancel</button><button class="primary" onclick="showSettle('${b.id}')">Settle</button></div>`; html+=`<div class="actions"><button class="secondary" onclick="closeModal()">Close</button></div>`;openModal(html)}
function showSettle(bid){let b=state.bets.find(x=>x.id===bid);openModal(`<h3>Settle Bet</h3><div class="field"><label>Winner</label><select id="winner">${b.participants.map(pid=>`<option value="${pid}">${byId(pid)?.name}</option>`).join('')}</select></div><div class="field"><label>Loser(s)</label><select id="losers" multiple size="${Math.min(5,b.participants.length)}">${b.participants.map(pid=>`<option value="${pid}">${byId(pid)?.name}</option>`).join('')}</select></div><div class="field"><label>Settlement rule</label><select id="rule"><option value="each">Each loser pays winner</option><option value="custom">Custom amount/prize count</option></select></div><div class="actions"><button class="secondary" onclick="showBet('${b.id}')">Back</button><button class="primary" onclick="settleBet('${b.id}')">Confirm</button></div>`)}
function settleBet(bid){let b=state.bets.find(x=>x.id===bid);let win=winner.value;let loss=[...losers.selectedOptions].map(o=>o.value).filter(x=>x!==win); if(!loss.length){alert('Select at least one loser.');return} b.winnerId=win;b.loserIds=loss;b.status='settled';b.settledAt=new Date().toISOString();b.settlements=loss.map(l=>({from:l,to:win,amount:b.stakeType==='money'?Number(b.amount||0):1}));closeModal();save()}
function cancelBet(bid){let b=state.bets.find(x=>x.id===bid);b.status='cancelled';closeModal();save()}
function showSettings(){openModal(`<h3>Settings</h3><div class="field"><label>Currency symbol</label><input id="cur" value="${state.currency}"></div><div class="field"><label>Unit label</label><input id="unitLbl" value="${state.unitLabel}"></div><div class="actions"><button class="secondary" onclick="closeModal()">Cancel</button><button class="primary" onclick="state.currency=cur.value||'Q';state.unitLabel=unitLbl.value||'u';closeModal();save()">Save</button></div>`)}
function exportData(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='betledger-backup.json';a.click()}
function resetData(){if(confirm('Delete all BetLedger local data?')){state=JSON.parse(JSON.stringify(seed));save()}}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
render();
</script>
</body>
</html>
